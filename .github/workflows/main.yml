name: Peoples-newspaper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newspaper downloader script
        run: python script_name.py

      - name: Upload papers folder to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: papers
          path: papers/
