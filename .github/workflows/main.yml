name: Peoples-newspaper
on:
  schedule:
    # 设置每天 2:00 AM UTC 执行
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run:
    runs-on: ubuntu-latest  # 选择 GitHub Actions 使用的操作系统

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run newspaper downloader script
        run: python script_name.py  # 替换为你实际的 Python 脚本文件名
